server.port=${SERVER_PORT:8080}

spring.datasource.url=${SQLITE_DATASOURCE_URL:jdbc:sqlite:/app/data/poe.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/sqlite/schema.sql
spring.sql.init.data-locations=classpath:db/sqlite/data.sql
