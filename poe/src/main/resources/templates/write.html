<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poe - Write</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="container">
    <div class="brand">
      <img class="brand-image" src="/poe.webp" alt="Edgar Allan Poe portrait">
      <h1>Poe</h1>
    </div>
    <nav>
      <a href="/">Today</a>
      <a href="/history">History</a>
      <a href="/write">Write A Poem</a>
    </nav>
  </header>

  <main class="container">
    <section>
      <h2>Write a poem</h2>
      <p class="muted">Max 2000 characters</p>
      <p class="muted">Today's submissions: <span th:text="${todayCount} + ' / ' + ${todayLimit}"></span></p>
      <p class="error" th:if="${!canSubmit}">There have already been 30 poems today, so can't submit any more today.</p>
      <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
      <form method="post" action="/write">
        <label for="content">Poem</label>
        <textarea id="content" name="content" maxlength="2000" required th:text="${content}" th:disabled="${!canSubmit}"></textarea>
        <p id="char-counter" class="muted char-counter" aria-live="polite">0 / 2000 characters</p>
        <button type="submit" th:disabled="${!canSubmit}">Post poem</button>
      </form>
    </section>
  </main>
  <script>
    (function () {
      var textarea = document.getElementById("content");
      var counter = document.getElementById("char-counter");
      var maxChars = 2000;

      if (!textarea || !counter) {
        return;
      }

      function updateCounter() {
        counter.textContent = textarea.value.length + " / " + maxChars + " characters";
      }

      textarea.addEventListener("input", updateCounter);
      updateCounter();
    })();
  </script>
</body>
</html>
