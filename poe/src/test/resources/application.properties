spring.datasource.url=jdbc:sqlite:target/test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/sqlite/schema.sql
spring.sql.init.data-locations=classpath:db/sqlite/data.sql

poems.guardrails.rate-limit.max-requests=5
poems.guardrails.rate-limit.window=PT10M
poems.guardrails.duplicate-window=PT24H
